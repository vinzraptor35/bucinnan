
<!DOCTYPE html>
<html lang="id">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Special For You ❤</title>
 <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
 <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
 <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
 <style>
 body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: url('https://j.top4top.io/p_3819io9xr0.jpeg') no-repeat center center/cover; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
 .card { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); border-radius: 20px; padding: 30px; width: 85%; max-width: 400px; text-align: center; color: white; border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); display: none; }
 .foto-profil { width: 100px; height: 100px; border-radius: 50%; border: 3px solid white; object-fit: cover; margin-bottom: 20px; }
 h1 { font-size: 24px; margin-bottom: 10px; font-weight: 600; }
 p { font-size: 16px; line-height: 1.6; opacity: 0.9; min-height: 50px; margin-bottom: 15px; }
 .wrapper-input { display: none; margin-top: 15px; animation: fadeIn 0.5s ease; }
 textarea { width: 90%; height: 70px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); color: white; padding: 10px; font-family: 'Poppins', sans-serif; resize: none; outline: none; text-align: center; font-size: 14px; }
 textarea::placeholder { color: rgba(255,255,255,0.6); }
 .btn-wa { display: block; background-color: #25d366; color: white; padding: 12px 24px; font-weight: 600; text-decoration: none; border-radius: 30px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); transition: 0.3s; margin: 15px auto 0 auto; width: fit-content; cursor: pointer; border: none; font-size: 15px; }
 .btn-wa:hover { transform: scale(1.05); background-color: #20ba5a; }
 @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
 </style>
</head>
<body>
 <audio id="suaraBucin" src="https://k.top4top.io/m_3819w9ra70.mpeg" preload="auto" loop></audio>
 <div class="card" id="mainCard">
 <img class="foto-profil" src="https://g.top4top.io/p_3819x1f3t0.jpeg" alt="Profile">
 <h1>For You: Putri ❤</h1>
 <p><span id="ketikTeks"></span></p>
 
 <div class="wrapper-input" id="areaBalas">
 <textarea id="pesanUser" placeholder="Kirim kesan pesan lu ke Fengxiu..."></textarea>
 <button onclick="kirimKeWA()" class="btn-wa">Balas 📩</button>
 </div>
 </div>
 <script>
 const card = document.getElementById('mainCard');
 const areaBalas = document.getElementById('areaBalas');
 
 window.addEventListener('load', () => {
 Swal.fire({
 title: 'Hai Sayang Putri! 😙',
 text: 'Ada pesan spesial yang harus kamu buka sekarang...',
 icon: 'info',
 confirmButtonText: 'Buka pesan 📩 ',
 confirmButtonColor: '#ff4757',
 allowOutsideClick: false
 }).then((result) => {
 if (result.isConfirmed) {
 card.style.display = 'block';
 const audio = document.getElementById('suaraBucin');
 audio.play().catch(e => console.log(e));
 
 new Typed('#ketikTeks', {
 strings: ['Kamu adalah penjaga hati yang tak pernah kusangka akan kutemukan. Di tengah dunia yang penuh dengan pilihan, hatiku hanya ingin berlabuh padamu. Terima kasih sudah menjadi tempat pulang yang paling aman, menjaga setiap rasa ini dengan tulus, dan membuatku yakin bahwa mencintaimu adalah keputusan terbaik yang pernah kubuat I love you more than words can say. You are my forever..... ❤️'],
 typeSpeed: 50,
 loop: false,
 showCursor: true,
 cursorChar: '|',
 onComplete: () => {
 areaBalas.style.display = 'block';
 }
 });
 }
 });
 });

 function kirimKeWA() {
 const isiPesan = document.getElementById('pesanUser').value.trim();
 if (!isiPesan) {
 alert('Tulis kesan & pesannya dulu dong King/Queen! 🥺');
 return;
 }
 
 const formatSms = "Halo Raja FengXiu!\n\nMakasih banyak ya web HBD/BUCIN/MAAF-nya.\nIni kesan & pesan dari gw:\n\n\"" + isiPesan + "\"";
 const linkWa = "https://wa.me/6285242556628?text=" + encodeURIComponent(formatSms);
 
 window.location.href = linkWa;
 }
 </script>
</body>
</html>
