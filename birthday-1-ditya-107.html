
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Weirdo! 💩</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: url('https://f.top4top.io/p_3819gnj5q0.jpeg') no-repeat center center/cover; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        
        .poop-fly { position: absolute; bottom: -20px; font-size: 24px; pointer-events: none; animation: flyUp 4s linear infinite; opacity: 0.7; z-index: 1; }
        @keyframes flyUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-105vh) scale(1.2); opacity: 0; }
        }

        .box-container { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; z-index: 5; position: relative; }

        .card { background: rgba(10, 20, 10, 0.8); backdrop-filter: blur(12px); border-radius: 20px; padding: 35px 25px; width: 85%; max-width: 380px; text-align: center; color: white; border: 1px solid #1e3f20; box-shadow: 0 0 25px rgba(34, 139, 34, 0.6), inset 0 0 15px rgba(0, 100, 0, 0.3); position: relative; box-sizing: border-box; animation: fadeIn 0.5s ease; }
        
        .card::before, .card::after { content: ''; position: absolute; width: 12px; height: 12px; border: 2px solid #2e6f40; }
        .card::before { top: 12px; left: 12px; border-right: 0; border-bottom: 0; }
        .card::after { bottom: 12px; right: 12px; border-left: 0; border-top: 0; }

        .foto-profil { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #2e6f40; object-fit: cover; margin-bottom: 20px; box-shadow: 0 0 10px rgba(0,255,0,0.3); }
        h1 { font-size: 22px; margin-bottom: 12px; font-weight: 600; color: #a3e2a8; text-shadow: 0 0 5px rgba(0,255,0,0.4); }
        p { font-size: 15px; line-height: 1.6; opacity: 0.95; min-height: 45px; margin-bottom: 15px; word-wrap: break-word; }
        
        .wrapper-input { display: none; margin-top: 15px; animation: fadeIn 0.5s ease; }
        textarea { width: 100%; height: 75px; border-radius: 12px; border: 1px solid #2e6f40; background: rgba(0,0,0,0.3); color: white; padding: 12px; font-family: 'Poppins', sans-serif; resize: none; outline: none; text-align: center; font-size: 14px; box-sizing: border-box; }
        textarea::placeholder { color: rgba(255,255,255,0.4); }
        
        .btn-action { display: inline-block; background-color: #2e6f40; color: white; padding: 12px 28px; font-weight: 600; text-decoration: none; border-radius: 30px; box-shadow: 0 4px 15px rgba(46, 111, 64, 0.4); transition: 0.3s; margin-top: 15px; cursor: pointer; border: none; font-size: 15px; }
        .btn-action:hover { transform: scale(1.05); background-color: #22522e; box-shadow: 0 4px 20px rgba(46, 111, 64, 0.6); }
        .btn-wa { background-color: #25d366; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }
        .btn-wa:hover { background-color: #20ba5a; box-shadow: 0 4px 20px rgba(37, 211, 102, 0.6); }

        .svg-icon { width: 85px; height: 85px; margin: 10px auto 20px auto; fill: #556b2f; display: block; animation: pulse 1.8s infinite; filter: drop-shadow(0 0 8px rgba(34, 139, 34, 0.7)); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <audio id="suaraBucin" src="https://j.top4top.io/m_3819owilx0.mpeg" preload="auto" loop></audio>
    
    <div class="box-container">
        <div class="card" id="boxStep1">
            <!-- Ikon Bentuk Poop SVG Spesial Warna Ijo Tua -->
            <svg class="svg-icon" viewBox="0 0 24 24">
                <path d="M12 3c-1.2 0-2.4.6-3.1 1.7-.5.7-.7 1.6-.5 2.5C6.7 7.7 5.5 9.2 5.1 11c-.3 1.1-.1 2.2.4 3.1-.9.5-1.5 1.4-1.5 2.4 0 1.9 1.9 3.5 4.8 4 1.1.2 2.2.3 3.2.3 1 0 2.1-.1 3.2-.3 2.9-.5 4.8-2.1 4.8-4 0-1-.6-1.9-1.5-2.4.5-.9.7-2 .4-3.1-.4-1.8-1.6-3.3-3.3-3.8.2-.9 0-1.8-.5-2.5C14.4 3.6 13.2 3 12 3zm0 2c.5 0 1 .3 1.3.8.3.5.4 1.1.2 1.6-.4.9-.1 1.9.7 2.4.8.5 1.5 1.3 1.7 2.2.2.7.1 1.5-.2 2.1-.4.8-.3 1.8.4 2.4.6.5 1 1.1 1 1.7 0 .9-1.2 2-3.8 2.4-.9.1-1.9.2-2.8.2s-1.9-.1-2.8-.2C5.2 18.2 4 17.1 4 16.2c0-.6.4-1.2 1-1.7.7-.6.8-1.6.4-2.4-.3-.6-.4-1.4-.2-2.1.2-.9.9-1.7 1.7-2.2.8-.5 1.1-1.5.7-2.4-.2-.5-.1-1.1.2-1.6.3-.5.8-.8 1.3-.8h3z"/>
            </svg>
            <h1>Ada Kiriman Paket Gaib 💩</h1>
            <p>Seseorang ngirim barang misterius berbau menyengat khusus buat lu hari ini...</p>
            <button onclick="actionStep1()" class="btn-action">Buka Paket 🤮</button>
        </div>

        <div class="card" id="boxStep2" style="display: none;">
            <!-- Ikon Pembukaan Unboxing Poop Terbuka -->
            <svg class="svg-icon" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
            </svg>
            <h1>ZONK! Isinya Surat ✉</h1>
            <p>Bukan bom nuklir tenang aja, buruan klik tombol di bawah buat liat kegoblokan isinya!</p>
            <button onclick="actionStep2()" class="btn-action">Baca Isi Surat 💩</button>
        </div>

        <div class="card" id="boxStep3" style="display: none;">
            <img class="foto-profil" src="https://d.top4top.io/p_3819q5zyc0.jpeg" alt="Profile">
            <h1>HBD: ditya 🤮</h1>
            <p><span id="ketikTeks"></span></p>
            
            <div class="wrapper-input" id="areaBalas">
                <textarea id="pesanUser" placeholder="Tulis makian / ucapan balasan lu..."></textarea>
                <button onclick="kirimKeWA()" class="btn-action btn-wa">Kirim Jin Balasan 📩</button>
            </div>
        </div>
    </div>

    <script>
        setInterval(() => {
            const emojis = ['💩', '🤮'];
            const chosen = emojis[Math.floor(Math.random() * emojis.length)];
            const item = document.createElement('div');
            item.className = 'poop-fly';
            item.innerHTML = chosen;
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(item);
            setTimeout(() => { item.remove(); }, 4000);
        }, 400);

        function actionStep1() {
            document.getElementById('boxStep1').style.display = 'none';
            document.getElementById('boxStep2').style.display = 'block';
        }

        function actionStep2() {
            document.getElementById('boxStep2').style.display = 'none';
            document.getElementById('boxStep3').style.display = 'block';
            
            const audio = document.getElementById('suaraBucin');
            audio.play().catch(e => console.log("Audio block:", e));
            
            new Typed('#ketikTeks', {
                strings: ['Selamat ulang tahun! 🎉<br><br>Umurmu nambah, tapi semoga kadar keanehanmu nggak ikut nambah ya. Terima kasih sudah lahir ke dunia dan bertahan hidup sampai hari ini, biar aku punya teman buat ketawa-ketiwi (dan kadang pusing-pusing sendiri).<br><br>Tetaplah jadi versi terbaik dari dirimu yang agak-agak nyeleneh itu. Jangan lupa traktirannya, karena doa gratisan doang nggak bikin kenyang! 😜🎂<br><br>Happy Birthday, my favorite weirdo! Love you to the moon and back (tapi tetep minta traktiran) 🥳🎉'],
                typeSpeed: 55,
                loop: false,
                showCursor: true,
                cursorChar: '💩',
                onComplete: () => {
                    document.getElementById('areaBalas').style.display = 'block';
                }
            });
        }

        function kirimKeWA() {
            const isiPesan = document.getElementById('pesanUser').value.trim();
            if (!isiPesan) {
                alert('Woi isi dulu balesannya, minimal ngamuk lah! 🤣');
                return;
            }
            
            const formatSms = "Halo FengXiu Developer Tampan!\n\nGw udh baca web ultah ciptaan lu buat gw.\nIni respon jujur gw:\n\n\"" + isiPesan + "\"";
            const linkWa = "https://wa.me/6285242556628?text=" + encodeURIComponent(formatSms);
            
            window.location.href = linkWa;
        }
    </script>
</body>
</html>
