
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special For You ❤</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: url('https://j.top4top.io/p_3819io9xr0.jpeg') no-repeat center center/cover; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        
        .heart-fly { position: absolute; bottom: -20px; color: #ff4757; font-size: 24px; pointer-events: none; animation: flyUp 4s linear infinite; opacity: 0.8; z-index: 1; }
        @keyframes flyUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-105vh) scale(1.2); opacity: 0; }
        }

        .box-container { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; z-index: 5; position: relative; }

        .card { background: rgba(15, 15, 15, 0.75); backdrop-filter: blur(12px); border-radius: 20px; padding: 35px 25px; width: 85%; max-width: 380px; text-align: center; color: white; border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 0 25px rgba(255, 105, 180, 0.6), inset 0 0 15px rgba(255, 182, 193, 0.2); position: relative; box-sizing: border-box; animation: fadeIn 0.5s ease; }
        
        .card::before, .card::after { content: ''; position: absolute; width: 12px; height: 12px; border: 2px solid #ffb6c1; }
        .card::before { top: 12px; left: 12px; border-right: 0; border-bottom: 0; }
        .card::after { bottom: 12px; right: 12px; border-left: 0; border-top: 0; }

        .foto-profil { width: 100px; height: 100px; border-radius: 50%; border: 3px solid white; object-fit: cover; margin-bottom: 20px; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        h1 { font-size: 22px; margin-bottom: 12px; font-weight: 600; color: #fff; text-shadow: 0 0 5px rgba(255,105,180,0.5); }
        p { font-size: 15px; line-height: 1.6; opacity: 0.95; min-height: 45px; margin-bottom: 15px; word-wrap: break-word; }
        
        .wrapper-input { display: none; margin-top: 15px; animation: fadeIn 0.5s ease; }
        textarea { width: 100%; height: 75px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); color: white; padding: 12px; font-family: 'Poppins', sans-serif; resize: none; outline: none; text-align: center; font-size: 14px; box-sizing: border-box; }
        textarea::placeholder { color: rgba(255,255,255,0.6); }
        
        .btn-action { display: inline-block; background-color: #ff4757; color: white; padding: 12px 28px; font-weight: 600; text-decoration: none; border-radius: 30px; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); transition: 0.3s; margin-top: 15px; cursor: pointer; border: none; font-size: 15px; }
        .btn-action:hover { transform: scale(1.05); background-color: #ff2a3a; box-shadow: 0 4px 20px rgba(255, 71, 87, 0.6); }
        .btn-wa { background-color: #25d366; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }
        .btn-wa:hover { background-color: #20ba5a; box-shadow: 0 4px 20px rgba(37, 211, 102, 0.6); }

        .svg-icon { width: 80px; height: 80px; margin: 10px auto 20px auto; fill: #ffb6c1; display: block; animation: pulse 2s infinite; filter: drop-shadow(0 0 8px rgba(255, 105, 180, 0.6)); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <audio id="suaraBucin" src="https://k.top4top.io/m_3819w9ra70.mpeg" preload="auto" loop></audio>
    
    <div class="box-container">
        <div class="card" id="boxStep1">
            <svg class="svg-icon" viewBox="0 0 24 24">
                <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
            <h1>Ada Pesan Spesial ✨</h1>
            <p>Seseorang telah mengirimkan sebuah amplop rahasia penuh makna khusus buat kamu.</p>
            <button onclick="actionStep1()" class="btn-action">Buka Amplop 📩</button>
        </div>

        <div class="card" id="boxStep2" style="display: none;">
            <svg class="svg-icon" viewBox="0 0 24 24">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-6.01 14.04c-.38.33-.87.49-1.37.46-.53-.03-1.01-.28-1.33-.67L5.5 11l1.41-1.41 3.51 3.51L17.09 6.5l1.41 1.41-5.51 9.13z"/>
            </svg>
            <h1>Ada Surat untuk Mu ✉</h1>
            <p>Silakan klik tombol di bawah untuk membaca pesan terdalam dariku secara langsung.</p>
            <button onclick="actionStep2()" class="btn-action">Buka Surat 💌</button>
        </div>

        <div class="card" id="boxStep3" style="display: none;">
            <img class="foto-profil" src="https://f.top4top.io/p_3819b66b10.jpeg" alt="Profile">
            <h1>For You: RaraImut ❤</h1>
            <p><span id="ketikTeks"></span></p>
            
            <div class="wrapper-input" id="areaBalas">
                <textarea id="pesanUser" placeholder="Kirim kesan pesan lu ke Fengxiu..."></textarea>
                <button onclick="kirimKeWA()" class="btn-action btn-wa">Balas 📩</button>
            </div>
        </div>
    </div>

    <script>
        setInterval(() => {
            const heart = document.createElement('div');
            heart.className = 'heart-fly';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 4000);
        }, 350);

        function actionStep1() {
            document.getElementById('boxStep1').style.display = 'none';
            document.getElementById('boxStep2').style.display = 'block';
        }

        function actionStep2() {
            document.getElementById('boxStep2').style.display = 'none';
            document.getElementById('boxStep3').style.display = 'block';
            
            const audio = document.getElementById('suaraBucin');
            audio.play().catch(e => console.log("Audio autoplay block:", e));
            
            new Typed('#ketikTeks', {
                strings: ['Kamu adalah penjaga hati yang tak pernah kusangka akan kutemukan. Di tengah dunia yang penuh dengan pilihan, hatiku hanya ingin berlabuh padamu. Terima kasih sudah menjadi tempat pulang yang paling aman, menjaga setiap rasa ini dengan tulus, dan membuatku yakin bahwa mencintaimu adalah keputusan terbaik yang pernah kubuat I love you more than words can say. You are my forever..... ❤️'],
                typeSpeed: 50,
                loop: false,
                showCursor: true,
                cursorChar: '|',
                onComplete: () => {
                    document.getElementById('areaBalas').style.display = 'block';
                }
            });
        }

        function kirimKeWA() {
            const isiPesan = document.getElementById('pesanUser').value.trim();
            if (!isiPesan) {
                alert('Tulis kesan & pesannya dulu dong King/Queen! 🥺');
                return;
            }
            
            const formatSms = "Halo Raja FengXiu!\n\nMakasih banyak ya web BUCIN-nya.\nIni kesan & pesan dari gw:\n\n\"" + isiPesan + "\"";
            const linkWa = "https://wa.me/6285242556628?text=" + encodeURIComponent(formatSms);
            
            window.location.href = linkWa;
        }
    </script>
</body>
</html>
